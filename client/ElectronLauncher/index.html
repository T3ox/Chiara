<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chiara Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Pulsante profilo (in alto a destra, fisso) -->
  <button id="profileBtn" class="profile-btn" title="Profilo utente">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
  </button>

  <!-- Sidebar profilo -->
  <aside id="profileSidebar" class="profile-sidebar" aria-hidden="true">
    <div class="profile-sidebar-header">
      <span>Profilo</span>
      <button id="profileClose" class="profile-close" title="Chiudi">&times;</button>
    </div>

    <div class="profile-avatar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </div>

    <div class="profile-info">
      <div class="profile-field">
        <span class="profile-label">Nome</span>
        <span class="profile-value" id="profileName">—</span>
      </div>
      <div class="profile-field">
        <span class="profile-label">Pacchetto</span>
        <span class="profile-value" id="profilePackage">—</span>
      </div>
      <div class="profile-field">
        <span class="profile-label">Spazio rimanente</span>
        <div class="profile-gb-bar">
          <div class="profile-gb-fill" id="profileGbFill"></div>
        </div>
        <span class="profile-gb-label" id="profileGbLabel">— GB rimanenti</span>
      </div>
    </div>
  </aside>

  <!-- Overlay per chiudere sidebar cliccando fuori -->
  <div id="profileOverlay" class="profile-overlay"></div>

  <div class="window">
    <h1 class="title">Chiara Launcher</h1>
    <h2 id="versionLabel" class="version-label">Version</h2>

    <div id="dropzone" class="dropzone">
      <div>
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>
          </svg>
        </div>
        <div class="hint">Trascinare qui la cartella o cliccare per selezionare</div>
        <div id="selectedPath" class="selectedPath">Nessuna cartella selezionata</div>
      </div>
    </div>

    <div id="status" class="status"></div>
    <div id="folderSizeWarning" class="folder-size-warning hidden">
      <span id="folderSizeWarningText"></span>
      <a id="upgradeBtn" class="btn-upgrade" href="#" title="Vedi i piani disponibili">Upgrade</a>
    </div>

    <div id="readProgressContainer" class="progress-wrapper hidden">
      <div class="progress-label" id="readProgressText">Lettura file: 0 / 0</div>
      <div class="progress-bar-bg">
        <div id="readProgressBar" class="progress-bar-fill"></div>
      </div>
    </div>

    <div class="actions">
      <button id="confirmBtn" class="btn" disabled>Conferma Selezione</button>

      <!-- alternativa web per "scegli cartella" -->
      <label class="btn-secondary">
        Seleziona cartella…
        <input id="folderPicker" type="file" webkitdirectory multiple hidden />
      </label>
    </div>

    <!-- Update Modal -->
    <div id="updateModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="updateModalTitle">Aggiornamento Disponibile</h2>
        <div class="version-info">
          <p id="updateModalCurrentVersion"></p>
          <p id="updateModalNewVersion"></p>
        </div>
        <textarea id="updateModalNotes" readonly class="release-notes"></textarea>
        
        <!-- Progress Bar Container -->
        <div id="updateProgressContainer" class="progress-container hidden">
          <p id="updateProgressText" class="progress-text">Download: 0%</p>
          <div class="progress-bar-bg">
            <div id="updateProgressBar" class="progress-bar-fill"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="updateModalIgnoreBtn" class="btn btn-secondary">Ignora</button>
          <button id="updateModalUpdateBtn" class="btn">Aggiorna</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
