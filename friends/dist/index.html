<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends HQ 🚀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-DATbERTN.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DyS4VH6h.css">
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- INTRO -->
  <div id="intro">
    <div class="intro-content">
      <div class="intro-badge">✦ Est. 2025</div>
      <h1>Friends<br><span>HQ</span></h1>
      <p>Il quartier generale del gruppo.<br>Trova la tua scrivania.</p>
      <button id="enter-btn">Entra nell'ufficio →</button>
    </div>
    <div class="intro-bg-shapes">
      <div class="shape s1"></div>
      <div class="shape s2"></div>
      <div class="shape s3"></div>
    </div>
  </div>

  <!-- HINT -->
  <div id="hints" class="hidden">
    <span>🖱️</span> Clicca su una scrivania · Trascina per ruotare
  </div>

  <!-- BACK BUTTON -->
  <button id="back-btn" class="hidden">← Torna all'ufficio</button>

  <!-- INFO CARD -->
  <div id="info-card" class="hidden">
    <div class="card-inner">
      <button class="card-close" id="card-close">✕</button>
      <div class="card-avatar" id="card-avatar"></div>
      <div class="card-name" id="card-name"></div>
      <div class="card-fullname" id="card-fullname"></div>
      <div class="card-role" id="card-role"></div>
      <div class="card-divider"></div>
      <div class="card-bio" id="card-bio"></div>
      <div class="card-tags" id="card-tags"></div>
      <div class="card-funfact" id="card-funfact"></div>
    </div>
  </div>

  <!-- PERSON NAV DOTS -->
  <div id="person-nav" class="hidden">
    <div class="nav-label">TEAM</div>
    <div class="nav-dots" id="nav-dots"></div>
  </div>

</body>
</html>
