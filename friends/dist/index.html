<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Special+Elite&family=Cutive+Mono&family=Archivo+Black&family=Permanent+Marker&family=Rubik+Mono+One&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-DelLtSuU.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CCXlTnFj.css">
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- INTRO -->
  <div id="intro">
    <div class="intro-content">
      <h1 class="intro-title" aria-label="Friends HQ">
        <span class="friends-word" aria-hidden="true">
          <span class="paper-letter paper-letter-f">F</span>
          <span class="paper-letter paper-letter-r">r</span>
          <span class="paper-letter paper-letter-i">i</span>
          <span class="paper-letter paper-letter-e">e</span>
          <span class="paper-letter paper-letter-n">n</span>
          <span class="paper-letter paper-letter-d">d</span>
          <span class="paper-letter paper-letter-s">s</span>
        </span>
        <span class="hq-word" data-text="HQ" aria-hidden="true">HQ</span>
      </h1>
      <p>Il quartier generale del gruppo.<br>Incontra il team.</p>
      <button id="enter-btn">Entra nell'ufficio →</button>
    </div>
    <div id="code-rain-container"></div>
  </div>

  <!-- HINT -->
  <div id="hints" class="hidden">
    <span>🖱️</span> Clicca su una scrivania · Trascina per ruotare
  </div>

  <!-- BACK BUTTON -->
  <button id="back-btn" class="hidden">← Torna all'ufficio</button>

  <!-- INFO CARD -->
  <div id="info-card" class="hidden">
    <div class="card-inner">
      <button class="card-close" id="card-close">✕</button>
      <div class="card-avatar" id="card-avatar"></div>
      <div class="card-name" id="card-name"></div>
      <div class="card-fullname" id="card-fullname"></div>
      <div class="card-role" id="card-role"></div>
      <div class="card-divider"></div>
      <div class="card-bio" id="card-bio"></div>
      <div class="card-skills" id="card-skills"></div>
      <div class="card-funfact" id="card-funfact"></div>
      <div class="card-social" id="card-social"></div>
      <div class="card-nav">
        <button class="card-nav-btn" id="card-prev"></button>
        <button class="card-nav-btn" id="card-next"></button>
      </div>
    </div>
  </div>

  <!-- PERSON NAV DOCK -->
  <div id="person-nav" class="hidden"></div>

</body>
</html>
